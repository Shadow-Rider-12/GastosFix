{% extends 'base.html' %}
{% block content %}
<div class="row align-items-center mb-4">
    <div class="col">
        <h2 class="fw-bold m-0">Añadir Nuevo Gasto</h2>
        <p class="text-muted m-0">Ingresa los datos para registrar la transacción en MySQL.</p>
    </div>
</div>

<div class="premium-card mx-auto" style="max-width: 600px;">
    {% if error %}
        <div class="alert alert-danger border-0 mb-4 fw-medium" style="background-color: rgba(220, 38, 38, 0.2); color: #fca5a5;">
            <i class="bi bi-exclamation-circle-fill me-2"></i> {{ error }}
        </div>
    {% endif %}
    
    <form method="POST">
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Descripción Detallada</label>
            <input type="text" name="descripcion" class="form-control bg-dark text-white border-secondary" placeholder="Ej: Compra de insumos de oficina" required value="{{ datos.descripcion|default('') }}">
        </div>
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Monto ($)</label>
            <input type="number" step="0.01" name="monto" class="form-control bg-dark text-white border-secondary" placeholder="Ej: 15000" required value="{{ datos.monto|default('') }}">
        </div>
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Fecha de Compra</label>
            <input type="date" name="fecha" class="form-control bg-dark text-white border-secondary" required value="{{ datos.fecha|default('') }}">
        </div>
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Clasificación por Categoría</label>
            <select name="categoria_id" class="form-select bg-dark text-white border-secondary" required>
                <option value="" disabled selected>-- Seleccione Categoría --</option>
                {% for c in categorias %}
                    <option value="{{ c.id }}" {% if datos.categoria_id|default(0)|int == c.id %}selected{% endif %}>{{ c.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Canal / Método de Pago</label>
            <select name="metodo_pago_id" class="form-select bg-dark text-white border-secondary" required>
                <option value="" disabled selected>-- Seleccione Método --</option>
                {% for m in metodos_pago %}
                    <option value="{{ m.id }}" {% if datos.metodo_pago_id|default(0)|int == m.id %}selected{% endif %}>{{ m.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="d-flex justify-content-between mt-4">
            <a href="{{ url_for('lista_gastos') }}" class="btn btn-outline-light border-secondary">Cancelar</a>
            <button type="submit" class="btn btn-premium px-4 shadow-sm">Guardar en Base de Datos</button>
        </div>
    </form>
</div>
{% endblock %}
