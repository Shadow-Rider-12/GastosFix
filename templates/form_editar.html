{% extends 'base.html' %}
{% block content %}
<div class="row align-items-center mb-4">
    <div class="col">
        <h2 class="fw-bold m-0 text-warning">Modificar Registro #{{ gasto.id }}</h2>
        <p class="text-muted m-0">Actualiza las propiedades de este flujo financiero.</p>
    </div>
</div>

<div class="premium-card mx-auto" style="max-width: 600px;">
    {% if error %}
        <div class="alert alert-danger border-0 mb-4 fw-medium" style="background-color: rgba(220, 38, 38, 0.2); color: #fca5a5;">
            <i class="bi bi-exclamation-circle-fill me-2"></i> {{ error }}
        </div>
    {% endif %}
    
    <form method="POST">
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Descripción</label>
            <input type="text" name="descripcion" class="form-control bg-dark text-white border-secondary" required value="{{ gasto.descripcion|default('') }}">
        </div>
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Monto ($)</label>
            <input type="number" step="0.01" name="monto" class="form-control bg-dark text-white border-secondary" required value="{{ gasto.monto|default('') }}">
        </div>
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Fecha</label>
            <input type="date" name="fecha" class="form-control bg-dark text-white border-secondary" required value="{{ gasto.fecha|default('') }}">
        </div>
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Categoría</label>
            <select name="categoria_id" class="form-select bg-dark text-white border-secondary" required>
                {% for c in categorias %}
                    <option value="{{ c.id }}" {% if gasto.categoria_id|default(0)|int == c.id %}selected{% endif %}>{{ c.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label text-muted small fw-bold text-uppercase">Método de Pago</label>
            <select name="metodo_pago_id" class="form-select bg-dark text-white border-secondary" required>
                {% for m in metodos_pago %}
                    <option value="{{ m.id }}" {% if gasto.metodo_pago_id|default(0)|int == m.id %}selected{% endif %}>{{ m.nombre }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="d-flex justify-content-between mt-4">
            <a href="{{ url_for('lista_gastos') }}" class="btn btn-outline-light border-secondary">Descartar Cambios</a>
            <button type="submit" class="btn btn-premium btn-warning px-4 shadow-sm">Actualizar Transacción</button>
        </div>
    </form>
</div>
{% endblock %}
