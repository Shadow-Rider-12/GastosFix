<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastosFix - Dashboard Premium</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f19; /* Fondo ultra oscuro como la imagen */
            color: #f8fafc;
            overflow-x: hidden;
        }

        /* Contenedor tipo Aplicación */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Menú Lateral (Sidebar) */
        .sidebar {
            width: 260px;
            background-color: #111827; /* Gris oscuro profundo */
            border-right: 1px solid #1f2937;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 3rem;
            display: flex;
            align-items: center;
            letter-spacing: -0.03em;
        }

        .sidebar .nav-link {
            color: #9ca3af;
            font-weight: 500;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            transition: all 0.2s ease;
        }

        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #ffffff;
            background-color: #1f2937;
        }

        .sidebar .nav-link i {
            font-size: 1.25rem;
            margin-right: 1rem;
        }

        /* Contenido Principal (Derecha) */
        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 2.5rem;
            background-color: #0b0f19;
        }

        /* Estilos de Tarjetas Estilo "Glass" */
        .premium-card {
            background: rgba(17, 24, 39, 0.7);
            border: 1px solid #1f2937;
            border-radius: 16px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
        }

        /* Degradado especial tipo Tarjeta de Crédito de tu imagen */
        .gradient-card {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border: none;
            border-radius: 16px;
            padding: 1.75rem;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .gradient-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        /* Botones Estilizados */
        .btn-premium {
            background-color: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-premium:hover {
            background-color: #4f46e5;
            color: white;
        }

        /* Tablas con estilo de fila limpia */
        .table-dark-custom {
            color: #e5e7eb;
            width: 100%;
        }
        .table-dark-custom th {
            color: #9ca3af;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem;
            border-bottom: 1px solid #1f2937;
        }
        .table-dark-custom td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid #1f2937;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="brand">
                <i class="bi bi-wallet2 text-primary me-2"></i>Gastos<span class="text-primary">Fix</span>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="{{ url_for('inicio') }}"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                <a class="nav-link" href="{{ url_for('lista_gastos') }}"><i class="bi bi-list-columns-reverse"></i> Transacciones</a>
                <a class="nav-link text-warning" href="{{ url_for('crear_gasto_html') }}"><i class="bi bi-plus-circle-fill"></i> Nuevo Gasto</a>
            </nav>
        </div>

        <div class="main-content">
            {% if contenido_error %}
                <div class="premium-card text-center py-5 mx-auto" style="max-width: 500px;">
                    <i class="bi bi-exclamation-octagon text-danger display-3 mb-3"></i>
                    <h3>Ups, algo salió mal</h3>
                    <p class="text-muted">{{ contenido_error }}</p>
                    <a href="{{ url_for('inicio') }}" class="btn btn-premium mt-2">Volver al Dashboard</a>
                </div>
            {% else %}
                {% block content %}{% endblock %}
            {% endif %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
